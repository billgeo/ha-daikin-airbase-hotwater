name: Lint and tests

on:
  pull_request:
  push:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: lint jq
        run: |
          jq empty \
            hacs.json \
            custom_components/daikin_airbase_hotwater/manifest.json \
            custom_components/daikin_airbase_hotwater/translations/en.json
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Pytest with coverage
        run: |
          pytest \
            --cov=custom_components/daikin_airbase_hotwater \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
