name: Lint and tests

on:
  pull_request:
  push:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: lint jq
        run: |
          jq empty \
            hacs.json \
            custom_components/daikin_airbase_hotwater/manifest.json \
            custom_components/daikin_airbase_hotwater/translations/en.json
      - name: lint sorted
        run: python3 scripts/is_sorted.py
      - name: Ruff
        run: |
          ruff check .
          ruff format --check .
      - name: Pytest
        run: pytest
